# Gateway with msft-obo params ref.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: token-exchange-gateway
  namespace: agentgateway-system
spec:
  gatewayClassName: enterprise-agentgateway
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# Demo backend: httpbin so you can verify the request (and exchanged token) without an MCP server.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: obo-demo-backend
  namespace: agentgateway-system
spec:
  static:
    host: httpbin.agentgateway-system.svc.cluster.local
    port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jwt-secure-obo
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: token-exchange-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: obo-demo-backend
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
# httpbin for demo (e.g. GET /headers to verify request headers and exchanged token).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: httpbin
  namespace: agentgateway-system
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: agentgateway-system
  labels:
    app: httpbin
    service: httpbin
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8080
  selector:
    app: httpbin
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: agentgateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
      version: v1
  template:
    metadata:
      labels:
        app: httpbin
        version: v1
    spec:
      serviceAccountName: httpbin
      containers:
        - image: docker.io/mccutchen/go-httpbin:v2.15.0
          imagePullPolicy: IfNotPresent
          name: httpbin
          ports:
            - containerPort: 8080
