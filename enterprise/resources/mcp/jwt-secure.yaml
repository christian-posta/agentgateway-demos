apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jwt-secure-mcp
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway
  rules:
    - matches:
        - path:
            type: Exact
            value: /mcp  
      backendRefs:
      - name: public-mcp-backend
        group: agentgateway.dev
        kind: AgentgatewayBackend
---
# Keycloak Backend for JWKS (if Keycloak is not a Kubernetes Service)
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: keycloak-jwks
  namespace: agentgateway-system
spec:
  static:
    host: host.docker.internal  
    port: 8080
---
# Policy for CORS, header modification, and backend TLS
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: jwt-secure-mcp-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: jwt-secure-mcp
  backend:
    tls: {}  # Enables TLS for backend connections
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
            - "mcp.tool.name == 'microsoft_docs_fetch'"
            # - "mcp.tool.name == 'web_search_exa'"
            - "jwt.realm_access.roles.contains('ai-agents') && mcp.tool.target == 'deepwiki'"
            - "jwt.realm_access.roles.contains('supply-chain') && (mcp.tool.target == 'microsoft' || mcp.tool.target == 'openapi')"
  traffic:
    jwtAuthentication:
      mode: Optional
      providers:
        - issuer: http://localhost:8080/realms/mcp-realm
          audiences:
            - account
          jwks:
            remote:
              jwksPath: /realms/mcp-realm/protocol/openid-connect/certs
              backendRef:
                name: keycloak-jwks
                kind: AgentgatewayBackend
                group: agentgateway.dev
                port: 8080  
    cors:
      allowOrigins:
        - "*"
      allowHeaders:
        - "*"
      allowMethods:
        - "*"
      allowCredentials: false
    headerModifiers:
      request:
        remove:
          - x-forwarded-for
          - x-forwarded-host
          - x-forwarded-proto
