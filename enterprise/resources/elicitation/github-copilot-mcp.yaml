apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-copilot-mcp
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway
  rules:
    - matches:
        - path:
            type: Exact
            value: /github-copilot/mcp
        - path:
            type: Exact
            value: /.well-known/oauth-protected-resource/github-copilot/mcp  
        - path:
            type: Exact
            value: /.well-known/oauth-authorization-server/github-copilot/mcp                          
      backendRefs:
      - name: github-copilot-mcp-backend
        group: agentgateway.dev
        kind: AgentgatewayBackend
---
# MCP Backend with multiple targets
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: github-copilot-mcp-backend
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: github-copilot
        static:
          host: api.githubcopilot.com
          port: 443
          path: /mcp/
          protocol: StreamableHTTP  # Explicitly set protocol
          policies:
            tls: {}      
---
# Backend for Auth0 JWKS endpoint
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: keycloak-elicitation-mcp-backend
  namespace: agentgateway-system
spec:
  static:
    host: demo-keycloak-907026730415.us-east4.run.app
    port: 443
  policies:
    tls: {}                  
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: github-copilot-mcp-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: github-copilot-mcp
  backend:
    mcp:
      authentication:
        mode: Strict
        issuer: https://demo-keycloak-907026730415.us-east4.run.app/realms/kagent-dev
        audiences:
          - account
        jwks:
          backendRef:
            name: keycloak-elicitation-mcp-backend
            kind: AgentgatewayBackend
            group: agentgateway.dev
          jwksPath: realms/kagent-dev/protocol/openid-connect/certs 
        # provider: Auth0
        resourceMetadata:
          authorizationServers:
            - https://ceposta-agw.ngrok.io/github-copilot/mcp
          resource: https://ceposta-agw.ngrok.io/github-copilot/mcp
          scopesSupported:
            - profile
            - openid
            - offline_access
          bearerMethodsSupported:
            - header
            - body
            - query
          resourceDocumentation: https://ceposta-agw.ngrok.io/github-copilot/mcp/docs
          resourcePolicyUri: https://ceposta-agw.ngrok.io/github-copilot/mcp/policies     
  traffic:                           
    cors:
      allowOrigins:
        - "*"
      allowHeaders:
        - "*"
      allowMethods:
        - "*"
      allowCredentials: false
    headerModifiers:
      request:
        remove:
          - x-forwarded-for
          - x-forwarded-host
          - x-forwarded-proto
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: github-copilot-exchange
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: github-copilot-mcp-backend
  backend:
    tokenExchange:
      elicitation:
        secretName: github-token-exchange